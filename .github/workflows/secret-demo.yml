name: Secret Demo

on:
  push:
    branches:
      - main

jobs:
  show-secret-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm secret is available
        run: echo "Secret is configured successfully"
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
